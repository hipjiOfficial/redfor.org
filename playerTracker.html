<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Player Tracker"/>
    <meta property="og:description" content="Track your favorite players"/>
    <meta property="og:url" content="https://www.redfor.org/tracker"/>
    <meta name="twitter:card" content="summary_large_image"/>
    <title>redfor.org - player tracker</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="icon" href="/assets/images/Placeholder Site Logo.webp">
</head>
<audio id="bgm" loop>
  <source src="assets/audio/Bombline Main Theme.mp3" type="audio/mpeg">
</audio>
<script src="/assets/js/playertracker.js" defer></script>
<script src="/assets/js/audio.js" defer></script>
<script src="/assets/js/core.js" defer></script>
<script src="/assets/js/typing.js" defer></script>
<script src="/assets/js/shop.js" defer></script>
<script src="/assets/js/version.js" defer></script>
<body>
    <header>
        <label class="burger" for="burger">
            <input type="checkbox" id="burger">
            <span></span>
            <span></span>
            <span></span>
        </label>
    <div class="menu-card" id="menu">
        <a href="/">Home</a>
        <a href="/shop">Daily Shop</a>
        <a href="/tracker">Player Tracker</a>
        <a href="/gallery">Gallery</a>
        <a href="/about">About</a>
        <a href="/support">Support</a>
    </div>
    <h4 class="titlepath" id="typed-text" data-text="agent@framework:/usr/home/tracker"></h4>
  </header>
    <div class="tracker-container">
        <div class="stats">
        </div>
        <div class="user-card" id="user-card">
          <div class="uc-avatar">
              <img id="player-avatar" src="/assets/images/unknownuser.png" alt="Unknown User" >
              <span class="placeholder-icon" hidden>?</span>
          </div>

          <div class="uc-name">
              <span id="player-name">---</span>
          </div>

          <div class="uc-playercard">
              <img id="player-playercard" src="/playercards/Lost Media.png" alt="Failed to load player card!">
          </div>

          <div class="uc-skin">
              <img id="player-skin" src="/skins/Lost Media Skin.png" alt="Failed to load skin!">
          </div>
      </div>
    </div>
<footer>
    <h5 id="version-number"></h5>
    <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="hipji" data-description="Support me on Buy me a coffee!" data-message="" data-color="#eba61b" data-position="Right" data-x_margin="18" data-y_margin="18"></script>
</footer>
</body>
